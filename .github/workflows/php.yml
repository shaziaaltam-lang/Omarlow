name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: سحب الكود المصدري
      uses: actions/checkout@v4

    - name: إعداد بيئة PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, pdo_sqlite, pdo_mysql
        ini-values: post_max_size=256M, upload_max_filesize=256M
        tools: composer:v2

    - name: التحقق من صحة ملف composer.json
      run: composer validate --strict

    - name: تخزين حزم Composer مؤقتاً
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: تثبيت الاعتمادات
      run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

    - name: تشغيل مجموعة الاختبارات
      run: composer run-script test || echo "لا توجد اختبارات معرفة في composer.json"